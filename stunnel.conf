; Default example config.
; Replace this file or mount your own stunnel.conf at /etc/stunnel/stunnel.conf.
;
; Client and server mode are both controlled by each service's "client" option:
;   client = yes  -> stunnel works as a TLS client
;   client = no   -> stunnel works as a TLS server
;
; The container entrypoint injects:
;   foreground = yes
;   pid =

debug = info
output = /dev/stdout

; Example client tunnel:
; Listens for local plain TCP on 0.0.0.0:8080 and connects to a TLS server.
; Root CA certificates are built into the image at /etc/ssl/certs.
[client-example]
client = yes
accept = 0.0.0.0:8080
connect = example.com:443
verifyChain = yes
CAfile = /etc/ssl/certs/ca-certificates.crt
checkHost = example.com

; Example server tunnel:
; Uncomment and set real certificate files to terminate TLS and forward to app:80.
; Mount certs into /certs, for example:
;   /certs/fullchain.pem
;   /certs/privkey.pem
;
; [server-example]
; client = no
; accept = 0.0.0.0:8443
; connect = app:80
; cert = /certs/fullchain.pem
; key = /certs/privkey.pem
